[repository]
# Base URL for generated asset links
base_url = "https://assets.led-bugs.com"

# GitHub Pages domain (for CNAME)
# Leave empty if using default github.io domain
domain = ""

[build]
# Directories to process (relative to src/)
image_dirs = ["images"]
css_dirs = ["css"]
js_dirs = ["js"]
data_dirs = ["data"]
md_dirs = ["md"]

# Grid preview thumbnails (generated at build into dist/images/_thumbs/, not committed)
thumb_max_width = 560
thumb_webp_quality = 78
thumb_skip_if_smaller = true
